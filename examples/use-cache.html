<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVGIsolate Loading Strategies</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }
        :root {
            color-scheme: dark;
        }
        body {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;

            .row {
                display: flex;
                justify-content: center;
                gap: 20px;
            }
        }
        svg-isolate {
            width: 200px;
            height: 200px;
            outline: 1px dashed gray;
            overflow: auto;
        }
    </style>
</head>
<body>

    <div class="row">
        <svg-isolate src="/assets/circle.svg" no-cache></svg-isolate>

        <svg-isolate src="/assets/circle.svg" no-cache></svg-isolate>

        <svg-isolate src="/assets/circle.svg" no-cache></svg-isolate>

        <svg-isolate src="/assets/circle.svg" no-cache></svg-isolate>
    </div>

    <div class="row">
        <svg-isolate src="/assets/hexagon.svg"></svg-isolate>

        <svg-isolate src="/assets/hexagon.svg" loading="defer"></svg-isolate>

        <svg-isolate src="/assets/hexagon.svg" loading="defer"></svg-isolate>

        <svg-isolate src="/assets/hexagon.svg" loading="defer"></svg-isolate>
    </div>

    <script type="module">
        import SVGIsolate from '/src/SVGIsolate.js';

        SVGIsolate.define(null);

        window.SVG = SVGIsolate;
    </script>

</body>
</html>
