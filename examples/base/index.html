<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVGIsolate: Base URL Remapping</title>

    <link rel="stylesheet" href="../globals.css">
    <link rel="stylesheet" href="page.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Base URL Remapping</h1>

    <main>

        <div class="resized">
            <svg-isolate 
                class="svg-isolate" 
                srcset="
                    /solid/arrow-down-circle.svg 200w,
                    /solid/arrow-path.svg 400w,
                    /solid/bars-2.svg 600w,
                    /outline/cake.svg 800w,
                    /outline/check.svg 1000w,
                    /outline/cpu-chip.svg 1200w
                " 
                base="https://cdn.jsdelivr.net/npm/heroicons@2.2.0/24"
                responsive
            ></svg-isolate>
        </div>

        <section>
            <div class="icons">
                <div class="row">
                    <svg-isolate class="svg-isolate" src="/assets/circle.svg" base="/"></svg-isolate>
    
                    <svg-isolate class="svg-isolate" src="/hexagon.svg" base="/assets"></svg-isolate>
    
                    <svg-isolate class="svg-isolate" src="../../assets/triangle.svg" base="/"></svg-isolate>
    
                    <svg-isolate class="svg-isolate" src="/heart.svg" base="../../assets"></svg-isolate>
                </div>
    
                <div class="row">
                    <bootstrap-icon-svg class="svg-isolate" src="/0-circle.svg"></bootstrap-icon-svg>
    
                    <bootstrap-icon-svg class="svg-isolate" src="/1-circle.svg"></bootstrap-icon-svg>
    
                    <bootstrap-icon-svg class="svg-isolate" src="/2-circle.svg"></bootstrap-icon-svg>
    
                    <bootstrap-icon-svg class="svg-isolate" src="/3-circle.svg"></bootstrap-icon-svg>
                </div>
            </div>

            <div id="fetch-log">
                <h3>Fetching LOG:</h3>
                <div class="content">
                    <div class="logs"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <ul class="example-links">
            <li>
                <a href="https://github.com/components-1812/svg-isolate/tree/main/examples/base">Show example on GitHub</a>
            </li>
            <li>
                <a href="https://codepen.io/FrancoJavierGadea/pen/VYmrapr">Open on CodePen</a>
            </li>

            <li>
                <a href="/">More examples...</a>
            </li>
        </ul>
    </footer>

    <script type="module" src="script.js"></script>
</body>

</html>
