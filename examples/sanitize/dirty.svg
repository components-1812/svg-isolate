<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
    <defs>
        <clipPath id="clipPath">
            <path d="M100 170 L30 90 A35 35 0 1 1 100 60 A35 35 0 1 1 170 90 Z" />
        </clipPath>
    </defs>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: red;
            margin: 0;
        }
        p {
            color: green;
            font-size: 32px;
        }
        div {
            display: flex;
        }
        .heart {
            fill: #7C3AED;
            transform-origin: center;
        }
        .rect {
            fill: #1E1B4B;
            rx: 25px;
        }
    </style>

    <rect class="rect" onmouseover="import('./hack.js').then(mod => mod.hacking()); alert('You are attacked by SVG check the console');" x="10" y="10" width="280" height="280" rx="12" />
    
    <g class="heart" transform="translate(50, 50)">
        <rect x="0" y="0" width="200" height="200" stroke="none" clip-path="url(#clipPath)" />
    </g>
    
    <script>
        console.log('SVG script executed — this should not run inside svg-isolate');

        const heart = document.querySelector('.heart');

        if (heart) {
            heart.animate(
                [{ scale: 1 }, { scale: 1.5 }, { scale: 1 }],
                { duration: 1200, iterations: Infinity, easing: 'ease-in-out' }
            );
        }
    </script>
</svg>