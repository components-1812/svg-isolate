<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: red;
            margin: 0;
        }

        p {
            color: green;
            font-size: 32px;
        }

        div {
            display: flex;
        }

        circle {
            fill: #7C3AED;
        }

        rect {
            fill: #1E1B4B;
            rx: 12px;
        }

        text {
            font-size: 14px;
            fill: #E2E8F0;
            font-family: serif;
        }
    </style>

    <rect x="10" y="10" width="180" height="180" rx="12" />
    <circle cx="100" cy="85" r="40" />
    <text x="100" y="150" text-anchor="middle">hello svg</text>
    <text x="100" y="170" text-anchor="middle" style="font-size:10px;fill:#94A3B8">unsanitized</text>

    <script>
        console.log('SVG script executed — this should not run inside svg-isolate');

        const circle = document.querySelector('circle');

        if (circle) {
        circle.animate(
            [{ r: 40 }, { r: 55 }, { r: 40 }],
            { duration: 1200, iterations: Infinity, easing: 'ease-in-out' }
        );
        }
    </script>

</svg>