<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SVG Isolate: srcset and Resizing</title>

        <style>
            * {
                margin: 0;
                padding: 0;
            }
            :root {
                color-scheme: dark;
            }
            body {
                padding: 50px;
                display: flex;
                gap: 20px;
                flex-direction: column;
                justify-content: center;
            }

            .resized {
                width: 300px;
                height: 300px;
                outline: 1px dashed gray;
                overflow: auto;
                resize: both;

                p {
                    height: 500px;
                }
            }
            svg-isolate {
                display: block;
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>

        <!-- <div class="resized">

            <svg-isolate 
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                srcset-threshold="0" responsive loading="defer"
            ></svg-isolate>
        </div> -->

        <div class="resized">
            <p></p>
            <svg-isolate 
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                responsive loading="lazy"
            ></svg-isolate>
        </div>
        
        <script type="module">
            import SVGIsolate from '/src/SVGIsolate.js';

            SVGIsolate.define(null, {
                links: ['/src/SVGIsolate.css']
            });

            const svg = document.querySelector('svg-isolate');

            window.SVG = svg;
        </script>

    </body>
</html>
