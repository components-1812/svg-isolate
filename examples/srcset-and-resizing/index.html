<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SVG Isolate: srcset and Resizing</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">

            <svg-isolate width="200px" style="--width: '200px'" 
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                srcset-threshold="0" responsive loading="defer"
            ></svg-isolate>

            <svg-isolate width="400px"  style="--width: '400px'"
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                srcset-threshold="0" responsive loading="defer"
            ></svg-isolate>

            <svg-isolate width="800px"  style="--width: '800px'"
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                srcset-threshold="0" responsive loading="defer"
            ></svg-isolate>

            <svg-isolate width="1200px" style="--width: '1200px'"
                srcset="/assets/circle.svg 300w, /assets/triangle.svg 600w, /assets/hexagon.svg 900w, /assets/heart.svg 1200w"  
                srcset-threshold="0" responsive loading="defer"
            ></svg-isolate>

        </div>

        <script src="srcript.js" type="module"></script>

</html>
